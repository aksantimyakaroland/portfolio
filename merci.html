<!DOCTYPE html>
<html lang="fr" data-theme="light">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="robots" content="noindex"/>
  <title>Message envoyé — Roland A. Myaka</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #fff; --text: #111; --accent: #007BFF; --muted: #666;
    }
    [data-theme="dark"] {
      --bg: #0D0D0D; --text: #F5F5F5; --accent: #6C63FF; --muted: #aaa;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100vh; display: flex;
      align-items: center; justify-content: center;
      padding: 40px 24px; text-align: center;
    }
    .card {
      max-width: 480px;
      background: var(--bg);
      border: 1px solid #e8e8e8;
      border-radius: 20px;
      padding: 56px 40px;
      box-shadow: 0 16px 64px rgba(0,0,0,0.08);
    }
    .emoji { font-size: 3.5rem; margin-bottom: 20px; display: block; }
    h1 {
      font-family: 'Poppins', sans-serif;
      font-size: 1.8rem; font-weight: 800;
      letter-spacing: -0.03em; margin-bottom: 16px;
    }
    p { color: var(--muted); line-height: 1.7; margin-bottom: 32px; }
    a {
      display: inline-block;
      background: var(--accent); color: #fff;
      padding: 12px 28px; border-radius: 99px;
      font-family: 'Poppins', sans-serif;
      font-weight: 600; font-size: 0.9rem;
      text-decoration: none;
      transition: opacity 0.2s, transform 0.2s;
    }
    a:hover { opacity: 0.85; transform: translateY(-2px); }
  </style>
  <script>
    // Applique le thème sauvegardé
    const t = localStorage.getItem('theme') || 'light';
    document.documentElement.setAttribute('data-theme', t);
  </script>
</head>
<body>
  <div class="card">
    <span class="emoji">✅</span>
    <h1>Message envoyé !</h1>
    <p>
      Merci pour votre message. Je l'ai bien reçu et vous répondrai dans les 
      <strong>cours délais</strong>. À très bientôt !
    </p>
    <a href="index.html">← Retour au portfolio</a>
  </div>
</body>
</html>
